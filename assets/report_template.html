<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>nf-scrnaseq report — ${sample_id}</title>
<style>
  :root {
    --fg: #1f2933;
    --muted: #647480;
    --accent: #2b6cb0;
    --bg: #f7fafc;
    --panel-bg: #ffffff;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
    background: var(--bg);
    line-height: 1.5;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 1.5rem 2rem;
  }
  header h1 { margin: 0 0 0.25rem 0; font-weight: 600; }
  header .meta { opacity: 0.85; font-size: 0.95rem; }
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  section { margin-bottom: 2.5rem; }
  section h2 {
    border-bottom: 2px solid var(--border);
    padding-bottom: 0.5rem;
    margin-top: 0;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin: 1rem 0;
  }
  .summary-card {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    text-align: center;
  }
  .summary-card .value {
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--accent);
  }
  .summary-card .label { color: var(--muted); font-size: 0.85rem; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: #edf2f7; font-weight: 600; }
  .panels {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 1.5rem;
  }
  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
  }
  .panel h3 { margin-top: 0; font-size: 1rem; color: var(--accent); }
  .panel img { max-width: 100%; height: auto; display: block; }
  footer {
    text-align: center;
    color: var(--muted);
    padding: 1rem;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <h1>nf-scrnaseq report — ${sample_id}</h1>
  <div class="meta">Tissue: ${tissue} &middot; ${n_cells} cells &middot; ${n_clusters} clusters</div>
</header>

<main>

  <section>
    <h2>Summary</h2>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="value">${n_cells}</div>
        <div class="label">cells (post-QC)</div>
      </div>
      <div class="summary-card">
        <div class="value">${n_clusters}</div>
        <div class="label">Leiden clusters</div>
      </div>
    </div>
    <table>
      <tbody>
        ${metrics_table}
      </tbody>
    </table>
  </section>

  <section>
    <h2>QC filters applied</h2>
    <table>
      <tbody>
        ${filters_table}
      </tbody>
    </table>
  </section>

  <section>
    <h2>Diagnostic plots</h2>
    <div class="panels">
      ${panels}
    </div>
  </section>

  <section>
    <h2>Cluster sizes</h2>
    ${cluster_table}
  </section>

</main>

<footer>${generated_by}</footer>

</body>
</html>
